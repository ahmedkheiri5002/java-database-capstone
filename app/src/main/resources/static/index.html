<!-- index.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>Select Role</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/images/logo/Logo.png">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../assets/css/index.css">
    <link rel="stylesheet" href="../assets/css/style.css">

    <!-- JavaScript Files -->
    <script src="../js/util.js" defer></script>
    <script src="../js/render.js" defer></script>
    <script src="../js/components/header.js" defer></script>
    <script src="../js/components/footer.js" defer></script>
</head>

<body>

    <!-- Main Container -->
    <div class="container">

        <!-- Wrapper -->
        <div class="wrapper">

            <!-- Header Placeholder -->
            <div id="header"></div>

            <!-- Main Content -->
            <main class="role-selection">

                <h1>Select Your Role</h1>

                <div class="role-buttons">
                    <button id="adminBtn" class="role-btn">
                        Admin
                    </button>

                    <button id="patientBtn" class="role-btn">
                        Patient
                    </button>

                    <button id="doctorBtn" class="role-btn">
                        Doctor
                    </button>
                </div>

            </main>

            <!-- Footer Placeholder -->
            <div id="footer"></div>

        </div>

    </div>

    <!-- Login Modal -->
    <div id="modalOverlay" class="modal-overlay">

        <div class="modal">

            <button id="closeModal" class="close-btn" aria-label="Close Modal">
                &times;
            </button>

            <div id="modalContent">
                <!-- Login form or other dynamic content will be inserted here -->
            </div>

        </div>

    </div>

    <!-- Page-Specific JavaScript -->
    <script type="module" src="../js/index.js"></script>

</body>

</html>
