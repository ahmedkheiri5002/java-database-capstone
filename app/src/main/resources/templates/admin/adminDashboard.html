<!-- adminDashboard.html -->

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/png" th:href="@{/assets/images/logo/logo.png}" />

    <!-- Page Title -->
    <title>Admin Dashboard</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">

    <!-- JavaScript Files -->
    <script th:src="@{/js/render.js}" defer></script>
    <script th:src="@{/js/util.js}" defer></script>
    <script th:src="@{/js/components/header.js}" defer></script>
    <script th:src="@{/js/components/footer.js}" defer></script>
</head>

<body onload="renderContent()">

    <!-- Main Container -->
    <div class="container">

        <!-- Wrapper -->
        <div class="wrapper">

            <!-- Header Placeholder -->
            <div id="header"></div>

            <!-- Main Dashboard Content -->
            <main class="main-content">

                <!-- Search Bar -->
                <input
                    type="text"
                    id="searchBar"
                    placeholder="Search doctors..."
                >

                <!-- Filters -->
                <div class="filters">

                    <!-- Time Filter -->
                    <select id="timeFilter">
                        <option value="">All Times</option>
                        <option value="AM">AM</option>
                        <option value="PM">PM</option>
                    </select>

                    <!-- Specialty Filter -->
                    <select id="specialtyFilter">
                        <option value="">All Specialties</option>
                        <option value="Cardiologist">Cardiologist</option>
                        <option value="Dentist">Dentist</option>
                        <option value="Dermatologist">Dermatologist</option>
                        <option value="Neurologist">Neurologist</option>
                        <option value="Orthopedic">Orthopedic</option>
                        <option value="Pediatrician">Pediatrician</option>
                    </select>

                </div>

                <!-- Dynamic Content -->
                <div id="content"></div>

            </main>

            <!-- Footer Placeholder -->
            <div id="footer"></div>

        </div>

    </div>

    <!-- Modal -->
    <div id="modal" class="modal">

        <div class="modal-content">

            <button
                id="closeModal"
                class="close-btn"
                aria-label="Close Modal">
                &times;
            </button>

            <div id="modal-body">
                <!-- Dynamic modal content goes here -->
            </div>

        </div>

    </div>

    <!-- Page-Specific JavaScript -->
    <script
        type="module"
        th:src="@{/js/adminDashboard.js}"
        defer>
    </script>

    <script
        type="module"
        th:src="@{/js/doctorCard.js}"
        defer>
    </script>

</body>

</html>
